services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: gestione_immobiliare
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/schema_production.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: ${GESTIONALE_BUILD_CONTEXT:-.}
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8090:8090"
    env_file:
      - .env.docker
    environment:
      PORT: "8090"
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads_data:/var/www/html/uploads
      - backups_data:/var/www/html/backups
    develop:
      watch:
        - action: sync
          path: .
          target: /var/www/html
          ignore:
            - .git/
            - .claude/
            - .cursor/
            - docker/
            - .env
            - .env.*
            - uploads/
            - backups/
            - database/
            - docker-compose.yml
            - render.yaml
            - .dockerignore
            - .gitignore
            - .setup_complete
        - action: rebuild
          path: ./Dockerfile

  # --- NGROK (local dev only) ---
  # Runs only with: docker compose --profile dev up
  ngrok:
    image: ngrok/ngrok:latest
    profiles: ["dev"]
    restart: unless-stopped
    command:
      - "http"
      - "app:8090"
      - "--pooling-enabled"
    environment:
      # Set NGROK_AUTHTOKEN in your local .env (never commit it).
      # NOTE: the previously hard-coded token has been removed and MUST be rotated
      # in the ngrok dashboard — treat it as compromised (it was in git history).
      NGROK_AUTHTOKEN: "${NGROK_AUTHTOKEN:-}"
    ports:
      - "4040:4040" # Local dashboard to get your public link
    depends_on:
      - app

volumes:
  db_data:
  uploads_data:
  backups_data: