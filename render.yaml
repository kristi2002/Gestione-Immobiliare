# Render Blueprint — Gestionale Immobiliare
# Repo: https://github.com/kristi2002/Gestione-Immobiliare
#
# BEFORE DEPLOY:
# 1. Provision a MySQL 8 database (Render does not offer MySQL — use PlanetScale, Aiven,
#    DigitalOcean Managed MySQL, Railway, etc.) and set DB_* env vars in the Dashboard.
# 2. Set APP_URL to your Render URL (e.g. https://gestionale-immobiliare.onrender.com)
# 3. Generate strong APP_SECRET and CRON_SECRET
# 4. Run setup once: visit /setup.php then set SETUP_ENABLED=false
#
# Apply: https://dashboard.render.com/blueprint/new?repo=https://github.com/kristi2002/Gestione-Immobiliare

services:
  - type: web
    name: gestionale-immobiliare
    runtime: docker
    plan: starter
    region: frankfurt
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health.php
    disk:
      name: gestionale-uploads
      mountPath: /var/www/html/uploads
      sizeGB: 1
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: FORCE_HTTPS
        value: true
      - key: SETUP_ENABLED
        value: true
      - key: SESSION_NAME
        value: gestionale_session
      - key: DB_CHARSET
        value: utf8mb4
      - key: MAIL_ENABLED
        value: false
      - key: BACKUP_CLOUD_ENABLED
        value: true
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: BACKUP_S3_ENDPOINT
        sync: false
      - key: BACKUP_S3_BUCKET
        sync: false
      - key: BACKUP_S3_KEY
        sync: false
      - key: BACKUP_S3_SECRET
        sync: false
      - key: APP_URL
        sync: false
      - key: APP_SECRET
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASS
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false

  - type: cron
    name: gestionale-reminders
    runtime: docker
    schedule: "*/15 * * * *"
    dockerfilePath: ./Dockerfile
    dockerCommand: php /var/www/html/cron/process_reminders.php
    envVars:
      - key: APP_ENV
        fromService:
          type: web
          name: gestionale-immobiliare
          envVarKey: APP_ENV
      - key: DB_HOST
        fromService:
          type: web
          name: gestionale-immobiliare
          envVarKey: DB_HOST
      - key: DB_NAME
        fromService:
          type: web
          name: gestionale-immobiliare
          envVarKey: DB_NAME
      - key: DB_USER
        fromService:
          type: web
          name: gestionale-immobiliare
          envVarKey: DB_USER
      - key: DB_PASS
        fromService:
          type: web
          name: gestionale-immobiliare
          envVarKey: DB_PASS
      - key: DB_CHARSET
        fromService:
          type: web
          name: gestionale-immobiliare
          envVarKey: DB_CHARSET
      - key: MAIL_ENABLED
        fromService:
          type: web
          name: gestionale-immobiliare
          envVarKey: MAIL_ENABLED
      - key: SMTP_HOST
        fromService:
          type: web
          name: gestionale-immobiliare
          envVarKey: SMTP_HOST
      - key: SMTP_PORT
        fromService:
          type: web
          name: gestionale-immobiliare
          envVarKey: SMTP_PORT
      - key: SMTP_USER
        fromService:
          type: web
          name: gestionale-immobiliare
          envVarKey: SMTP_USER
      - key: SMTP_PASS
        fromService:
          type: web
          name: gestionale-immobiliare
          envVarKey: SMTP_PASS
      - key: SMTP_SECURE
        fromService:
          type: web
          name: gestionale-immobiliare
          envVarKey: SMTP_SECURE

  - type: cron
    name: gestionale-social
    runtime: docker
    schedule: "*/10 * * * *"
    dockerfilePath: ./Dockerfile
    dockerCommand: php /var/www/html/cron/publish_social_posts.php
    envVars:
      - key: DB_HOST
        fromService:
          type: web
          name: gestionale-immobiliare
          envVarKey: DB_HOST
      - key: DB_NAME
        fromService:
          type: web
          name: gestionale-immobiliare
          envVarKey: DB_NAME
      - key: DB_USER
        fromService:
          type: web
          name: gestionale-immobiliare
          envVarKey: DB_USER
      - key: DB_PASS
        fromService:
          type: web
          name: gestionale-immobiliare
          envVarKey: DB_PASS

  - type: cron
    name: gestionale-backup
    runtime: docker
    schedule: "0 3 * * *"
    dockerfilePath: ./Dockerfile
    dockerCommand: php /var/www/html/cron/backup_database.php
    envVars:
      - key: DB_HOST
        fromService:
          type: web
          name: gestionale-immobiliare
          envVarKey: DB_HOST
      - key: DB_NAME
        fromService:
          type: web
          name: gestionale-immobiliare
          envVarKey: DB_NAME
      - key: DB_USER
        fromService:
          type: web
          name: gestionale-immobiliare
          envVarKey: DB_USER
      - key: DB_PASS
        fromService:
          type: web
          name: gestionale-immobiliare
          envVarKey: DB_PASS
      - key: BACKUP_CLOUD_ENABLED
        fromService:
          type: web
          name: gestionale-immobiliare
          envVarKey: BACKUP_CLOUD_ENABLED
      - key: BACKUP_S3_ENDPOINT
        fromService:
          type: web
          name: gestionale-immobiliare
          envVarKey: BACKUP_S3_ENDPOINT
      - key: BACKUP_S3_BUCKET
        fromService:
          type: web
          name: gestionale-immobiliare
          envVarKey: BACKUP_S3_BUCKET
      - key: BACKUP_S3_KEY
        fromService:
          type: web
          name: gestionale-immobiliare
          envVarKey: BACKUP_S3_KEY
      - key: BACKUP_S3_SECRET
        fromService:
          type: web
          name: gestionale-immobiliare
          envVarKey: BACKUP_S3_SECRET
