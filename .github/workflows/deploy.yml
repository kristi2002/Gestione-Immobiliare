name: Deploy to Coolify

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Skip deploy when token is missing
        if: ${{ secrets.COOLIFY_TOKEN == '' }}
        run: echo "COOLIFY_TOKEN is not configured; skipping deploy trigger."

      - name: Trigger Coolify deploy
        if: ${{ secrets.COOLIFY_TOKEN != '' && secrets.COOLIFY_WEBHOOK_URL != '' }}
        run: |
          # COOLIFY_WEBHOOK_URL is a repo secret, e.g.
          #   https://coolify.your-domain.it/api/v1/deploy?uuid=XXXX&force=false
          # Prefer HTTPS so the bearer token isn't sent in clear text.
          curl -s "${{ secrets.COOLIFY_WEBHOOK_URL }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            --fail
