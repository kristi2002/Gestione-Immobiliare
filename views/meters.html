<div class="meters-view">
    <div class="view-header">
        <div class="view-header__text">
            <h2>Contatori Utenze</h2>
            <p>Gestisci le letture dei contatori per ogni immobile.</p>
        </div>
        <div class="view-header__actions">
            <button class="btn btn--primary" id="btn-new-reading">+ Inserisci lettura</button>
        </div>
    </div>

    <div id="meters-alert" class="alert" style="display:none;"></div>

    <div class="toolbar">
        <select id="meters-property-filter" class="form-select" style="max-width:280px;">
            <option value="">Tutti gli immobili</option>
        </select>
        <select id="meters-type-filter" class="form-select">
            <option value="">Tutti i tipi</option>
            <option value="gas">Gas</option>
            <option value="electricity">Elettricità</option>
            <option value="water">Acqua</option>
            <option value="heating">Riscaldamento</option>
        </select>
    </div>

    <div class="table-wrapper">
        <table class="data-table" id="meters-table">
            <thead>
                <tr>
                    <th>Immobile</th>
                    <th>Tipo contatore</th>
                    <th>Ultima lettura</th>
                    <th>Consumo stimato</th>
                    <th>Data lettura</th>
                    <th>Azioni</th>
                </tr>
            </thead>
            <tbody id="meters-tbody">
                <tr><td colspan="6" class="text-muted" style="text-align:center;padding:2rem;">Caricamento…</td></tr>
            </tbody>
        </table>
    </div>
    <div id="meters-pagination" class="pagination-container"></div>
</div>

<!-- New reading modal -->
<div class="modal-overlay" id="meters-modal" hidden>
    <div class="modal modal--lg" role="dialog" aria-labelledby="meters-modal-title">
        <div class="modal-header">
            <h3 id="meters-modal-title">Inserisci Lettura</h3>
            <button class="modal-close" id="meters-modal-close" aria-label="Chiudi">&times;</button>
        </div>
        <form id="meters-form" class="modal-body">
            <input type="hidden" id="meters-id" name="id">
            <div class="form-row form-row--2">
                <div class="form-group">
                    <label for="meters-property-id">Immobile <span class="required">*</span></label>
                    <select id="meters-property-id" name="property_id" class="form-select" required>
                        <option value="">— Seleziona immobile —</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="meters-type">Tipo contatore <span class="required">*</span></label>
                    <select id="meters-type" name="meter_type" class="form-select" required>
                        <option value="">— Seleziona tipo —</option>
                        <option value="gas">Gas</option>
                        <option value="electricity">Elettricità</option>
                        <option value="water">Acqua</option>
                        <option value="heating">Riscaldamento</option>
                    </select>
                </div>
            </div>
            <div class="form-row form-row--2">
                <div class="form-group">
                    <label for="meters-reading-value">Valore lettura <span class="required">*</span></label>
                    <input type="number" id="meters-reading-value" name="reading_value" class="form-input" step="0.01" required>
                </div>
                <div class="form-group">
                    <label for="meters-reading-date">Data lettura <span class="required">*</span></label>
                    <input type="date" id="meters-reading-date" name="reading_date" class="form-input" required>
                </div>
            </div>
            <div class="form-group">
                <label for="meters-notes">Note</label>
                <textarea id="meters-notes" name="notes" class="form-textarea" rows="3"></textarea>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn--ghost" id="meters-modal-cancel">Annulla</button>
                <button type="submit" class="btn btn--primary" id="meters-modal-save">Salva</button>
            </div>
        </form>
    </div>
</div>

<!-- Delete confirm modal -->
<div class="modal-overlay" id="meters-delete-modal" hidden>
    <div class="modal modal--sm" role="dialog">
        <div class="modal-header">
            <h3>Elimina lettura</h3>
            <button class="modal-close" id="meters-delete-close" aria-label="Chiudi">&times;</button>
        </div>
        <div class="modal-body">
            <p>Sei sicuro di voler eliminare questa lettura?</p>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn--ghost" id="meters-delete-cancel">Annulla</button>
            <button type="button" class="btn btn--danger" id="meters-delete-confirm">Elimina</button>
        </div>
    </div>
</div>

<script src="assets/js/meters.js"></script>
