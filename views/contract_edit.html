<div class="contract-edit-view entity-edit-view">
    <div class="profile-topbar">
        <button class="btn btn--ghost" id="cte-back"><i data-lucide="arrow-left"></i> Indietro</button>
    </div>

    <div class="view-header">
        <div class="view-header__text">
            <h2 id="cte-title">Nuovo Contratto</h2>
            <p>Compila i dati del contratto: tipo, immobile, parti, durata e canone.</p>
        </div>
    </div>

    <div id="cte-alert" class="alert" style="display:none;"></div>

    <div class="card" style="padding:24px 28px;">
        <form id="cte-form">
            <input type="hidden" id="cte-id">

            <div class="form-group">
                <label for="cte-title-input">Titolo <span class="required">*</span></label>
                <input type="text" id="cte-title-input" class="form-input" required maxlength="255" placeholder="es. Locazione Via Roma 10 — Rossi 2024-2028">
            </div>

            <div class="form-row form-row--3">
                <div class="form-group">
                    <label for="cte-type">Tipo</label>
                    <select id="cte-type" class="form-select">
                        <option value="locazione">Locazione</option>
                        <option value="compravendita">Compravendita</option>
                        <option value="preliminare">Preliminare</option>
                        <option value="mandato">Mandato</option>
                        <option value="altro">Altro</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="cte-status">Stato</label>
                    <select id="cte-status" class="form-select">
                        <option value="draft">Bozza</option>
                        <option value="sent">Inviato</option>
                        <option value="signed">Firmato</option>
                        <option value="expired">Scaduto</option>
                        <option value="cancelled">Annullato</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="cte-property">Immobile <span class="required">*</span></label>
                    <select id="cte-property" class="form-select" required>
                        <option value="">— Seleziona immobile —</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="cte-tenant">Inquilino</label>
                    <select id="cte-tenant" class="form-select"><option value="">— Nessuno —</option></select>
                </div>
                <div class="form-group">
                    <label for="cte-client">Proprietario</label>
                    <select id="cte-client" class="form-select"><option value="">— Nessuno —</option></select>
                </div>
            </div>

            <div class="form-row form-row--4">
                <div class="form-group"><label for="cte-start">Inizio</label><input type="date" id="cte-start" class="form-input"></div>
                <div class="form-group"><label for="cte-end">Fine</label><input type="date" id="cte-end" class="form-input"></div>
                <div class="form-group"><label for="cte-rent">Canone (€)</label><input type="number" id="cte-rent" class="form-input" min="0" step="0.01"></div>
                <div class="form-group"><label for="cte-deposit">Deposito (€)</label><input type="number" id="cte-deposit" class="form-input" min="0" step="0.01"></div>
            </div>

            <div class="form-group">
                <label for="cte-notes">Note</label>
                <textarea id="cte-notes" class="form-textarea" rows="3"></textarea>
            </div>

            <div id="cte-error" class="alert alert--error" style="display:none;margin:12px 0 0 0"></div>

            <div class="form-actions" style="display:flex;gap:8px;justify-content:flex-end;margin-top:20px;">
                <button type="button" class="btn btn--ghost" id="cte-cancel">Annulla</button>
                <button type="submit" class="btn btn--primary" id="cte-save">Salva</button>
            </div>
        </form>
    </div>
</div>

<script src="assets/js/contract_edit.js?v=1"></script>
