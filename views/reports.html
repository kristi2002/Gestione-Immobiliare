<div class="reports-view">
    <div class="view-header">
        <div class="view-header__text">
            <h2>Report &amp; Statistiche</h2>
            <p>Riepiloghi su immobili, incassi e spese. Esporta i dati in CSV.</p>
        </div>
        <div class="view-header__actions reports-toolbar">
            <label for="report-year" class="reports-toolbar__label">Anno</label>
            <input type="number" id="report-year" class="form-input reports-toolbar__year" min="2000" max="2100">
        </div>
    </div>

    <div id="reports-alert" class="alert" style="display:none;"></div>

    <div id="reports-kpi" class="db-stats" aria-live="polite">
        <div class="db-stat">
            <div class="db-stat__chip"><i data-lucide="building-2"></i></div>
            <div class="db-stat__label">Immobili attivi</div>
            <div class="db-stat__value" id="kpi-properties">—</div>
        </div>
        <div class="db-stat">
            <div class="db-stat__chip"><i data-lucide="trending-up"></i></div>
            <div class="db-stat__label">Incassi attesi</div>
            <div class="db-stat__value" id="kpi-expected">—</div>
        </div>
        <div class="db-stat">
            <div class="db-stat__chip"><i data-lucide="banknote"></i></div>
            <div class="db-stat__label">Incassato</div>
            <div class="db-stat__value" id="kpi-collected">—</div>
        </div>
        <div class="db-stat">
            <div class="db-stat__chip"><i data-lucide="wallet"></i></div>
            <div class="db-stat__label">Spese totali</div>
            <div class="db-stat__value" id="kpi-expenses">—</div>
        </div>
    </div>

    <div class="reports-grid">
        <div class="report-card report-card--wide" id="report-payments">
            <div class="report-card__header">
                <div class="report-card__title">
                    <span class="report-card__icon"><i data-lucide="euro"></i></span>
                    <h3>Pagamenti mensili</h3>
                </div>
                <button class="btn btn--export btn--sm btn-export" data-type="payments"><i data-lucide="download"></i> Esporta CSV</button>
            </div>
            <div class="report-card__body" id="report-payments-body">
                <p class="text-muted">Caricamento…</p>
            </div>
        </div>

        <div class="report-card" id="report-properties">
            <div class="report-card__header">
                <div class="report-card__title">
                    <span class="report-card__icon"><i data-lucide="building-2"></i></span>
                    <h3>Portafoglio immobili</h3>
                </div>
                <button class="btn btn--export btn--sm btn-export" data-type="properties"><i data-lucide="download"></i> Esporta CSV</button>
            </div>
            <div class="report-card__body" id="report-properties-body">
                <p class="text-muted">Caricamento…</p>
            </div>
        </div>

        <div class="report-card" id="report-expenses">
            <div class="report-card__header">
                <div class="report-card__title">
                    <span class="report-card__icon"><i data-lucide="trending-down"></i></span>
                    <h3>Spese per categoria</h3>
                </div>
                <button class="btn btn--export btn--sm btn-export" data-type="expenses"><i data-lucide="download"></i> Esporta CSV</button>
            </div>
            <div class="report-card__body" id="report-expenses-body">
                <p class="text-muted">Caricamento…</p>
            </div>
        </div>
    </div>
</div>

<script src="assets/js/reports.js"></script>
