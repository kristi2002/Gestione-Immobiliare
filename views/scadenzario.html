<div class="scadenzario-view">
    <div class="view-header">
        <div class="view-header__text">
            <h2>Scadenzario Fiscale</h2>
            <p>Tutte le scadenze in un'unica vista: contratti, imposta di registro, APE, assicurazioni, antiriciclaggio.</p>
        </div>
        <div class="view-header__actions">
            <select id="scad-horizon" class="form-select">
                <option value="90">Prossimi 90 giorni</option>
                <option value="180">Prossimi 6 mesi</option>
                <option value="365" selected>Prossimi 12 mesi</option>
                <option value="730">Prossimi 24 mesi</option>
            </select>
        </div>
    </div>

    <div id="scad-alert" class="alert" style="display:none;"></div>

    <div class="stats-grid" id="scad-stats">
        <div class="stat-card" style="border-left:4px solid var(--color-danger,#dc2626)">
            <div class="stat-card__value" id="stat-scad-overdue">—</div>
            <div class="stat-card__label">Scadute</div>
        </div>
        <div class="stat-card" style="border-left:4px solid var(--color-warning,#f59e0b)">
            <div class="stat-card__value" id="stat-scad-soon">—</div>
            <div class="stat-card__label">Entro 30 giorni</div>
        </div>
        <div class="stat-card">
            <div class="stat-card__value" id="stat-scad-upcoming">—</div>
            <div class="stat-card__label">In arrivo</div>
        </div>
        <div class="stat-card">
            <div class="stat-card__value" id="stat-scad-total">—</div>
            <div class="stat-card__label">Totale</div>
        </div>
    </div>

    <div class="toolbar">
        <select id="scad-type" class="form-select">
            <option value="">Tutti i tipi</option>
            <option value="contract_expiry">Scadenza contratto</option>
            <option value="registration">Imposta di registro</option>
            <option value="ape">Scadenza APE</option>
            <option value="insurance">Assicurazione</option>
            <option value="aml">Antiriciclaggio</option>
        </select>
    </div>

    <div class="table-wrapper">
        <table class="data-table" id="scad-table">
            <thead>
                <tr>
                    <th>Tipo</th>
                    <th>Soggetto</th>
                    <th>Immobile</th>
                    <th>Scadenza</th>
                    <th>Giorni</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="scad-tbody">
                <tr><td colspan="6" class="text-muted" style="text-align:center;padding:2rem;">Caricamento…</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script src="assets/js/scadenzario.js"></script>
