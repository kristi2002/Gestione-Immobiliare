<div class="reminders-view">
    <div class="view-header">
        <div class="view-header__text">
            <h2>Promemoria</h2>
            <p>Gestisci promemoria, automazioni e notifiche email programmate.</p>
        </div>
        <div class="view-header__actions">
            <button class="btn btn--ghost" id="btn-process-reminders" title="Elabora promemoria scaduti">
                ⚡ Elabora scaduti
            </button>
            <button class="btn btn--primary" id="btn-new-reminder">
                + Nuovo Promemoria
            </button>
        </div>
    </div>

    <div id="reminders-alert" class="alert" style="display:none;"></div>

    <div class="toolbar">
        <div class="search-box">
            <input type="search" id="reminder-search" class="form-input" placeholder="Cerca per titolo, proprietario, immobile…" autocomplete="off">
        </div>
        <select id="reminder-status-filter" class="form-select">
            <option value="">Tutti gli stati</option>
            <option value="pending" selected>In sospeso</option>
            <option value="completed">Completati</option>
            <option value="cancelled">Annullati</option>
        </select>
        <select id="reminder-frequency-filter" class="form-select">
            <option value="">Tutte le frequenze</option>
            <option value="once">Una tantum</option>
            <option value="weekly">Settimanale</option>
            <option value="monthly">Mensile</option>
            <option value="yearly">Annuale</option>
        </select>
        <select id="reminder-due-filter" class="form-select">
            <option value="">Tutte le scadenze</option>
            <option value="7">Scadono entro 7 giorni</option>
            <option value="30">Scadono entro 30 giorni</option>
        </select>
    </div>

    <div class="table-wrapper">
        <table class="data-table" id="reminders-table">
            <thead>
                <tr>
                    <th>Titolo</th>
                    <th>Data scadenza</th>
                    <th>Frequenza</th>
                    <th>Stato</th>
                    <th>Proprietario</th>
                    <th>Notifiche</th>
                    <th class="col-actions">Azioni</th>
                </tr>
            </thead>
            <tbody id="reminders-tbody">
                <tr>
                    <td colspan="7" class="table-empty">Caricamento...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Create / Edit modal -->
<div class="modal-overlay" id="reminder-modal" hidden>
    <div class="modal modal--lg" role="dialog" aria-labelledby="reminder-modal-title">
        <div class="modal-header">
            <h3 id="reminder-modal-title">Nuovo Promemoria</h3>
            <button class="modal-close" id="reminder-modal-close" aria-label="Chiudi">&times;</button>
        </div>
        <form id="reminder-form" class="modal-body">
            <input type="hidden" id="reminder-id">

            <fieldset class="form-section">
                <legend>Dettagli promemoria</legend>
                <div class="form-group">
                    <label for="reminder-title">Titolo <span class="required">*</span></label>
                    <input type="text" id="reminder-title" class="form-input" required maxlength="255">
                </div>
                <div class="form-group">
                    <label for="reminder-description">Descrizione</label>
                    <textarea id="reminder-description" class="form-textarea" rows="2"></textarea>
                </div>
                <div class="form-row form-row--3">
                    <div class="form-group">
                        <label for="reminder-date">Data e ora <span class="required">*</span></label>
                        <input type="datetime-local" id="reminder-date" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label for="reminder-frequency">Frequenza</label>
                        <select id="reminder-frequency" class="form-select">
                            <option value="once">Una tantum</option>
                            <option value="weekly">Settimanale</option>
                            <option value="monthly">Mensile</option>
                            <option value="yearly">Annuale</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="reminder-status">Stato</label>
                        <select id="reminder-status" class="form-select">
                            <option value="pending">In sospeso</option>
                            <option value="completed">Completato</option>
                            <option value="cancelled">Annullato</option>
                        </select>
                    </div>
                </div>
            </fieldset>

            <fieldset class="form-section">
                <legend>Associazioni</legend>
                <div class="form-row">
                    <div class="form-group">
                        <label for="reminder-client">Proprietario</label>
                        <select id="reminder-client" class="form-select">
                            <option value="">— Nessuno —</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="reminder-property">Immobile</label>
                        <select id="reminder-property" class="form-select">
                            <option value="">— Nessuno —</option>
                        </select>
                    </div>
                </div>
            </fieldset>

            <fieldset class="form-section">
                <legend>Notifiche email</legend>
                <div class="form-row">
                    <label class="checkbox-label">
                        <input type="checkbox" id="reminder-notify-admin" checked>
                        Notifica admin (email agenzia)
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="reminder-notify-client">
                        Notifica proprietario via email
                    </label>
                </div>

                <div id="client-email-fields" hidden>
                    <div class="form-group">
                        <label for="reminder-email-subject">Oggetto email al proprietario</label>
                        <input type="text" id="reminder-email-subject" class="form-input" maxlength="255" placeholder="Lascia vuoto per usare il titolo">
                    </div>
                    <div class="form-group">
                        <label for="reminder-email-body">Testo email al proprietario</label>
                        <textarea id="reminder-email-body" class="form-textarea" rows="4" placeholder="Lascia vuoto per usare un testo predefinito"></textarea>
                    </div>
                </div>
            </fieldset>

            <div class="modal-footer">
                <button type="button" class="btn btn--ghost" id="reminder-modal-cancel">Annulla</button>
                <button type="submit" class="btn btn--primary" id="reminder-modal-save">Salva</button>
            </div>
        </form>
    </div>
</div>

<script src="assets/js/reminders.js"></script>
