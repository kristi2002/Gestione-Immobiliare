<div class="leads-view">
    <div class="view-header">
        <div class="view-header__text">
            <h2>Leads</h2>
            <p>Gestisci i potenziali clienti, abbina immobili e converti in proprietari.</p>
        </div>
        <div class="view-header__actions">
            <button class="btn btn--primary" id="btn-new-lead">+ Nuovo Lead</button>
            <div class="leads-viewtoggle" role="tablist" aria-label="Modalità visualizzazione">
                <button type="button" id="lead-view-kanban" class="active" title="Pipeline" aria-label="Pipeline"><i data-lucide="columns-3"></i></button>
                <button type="button" id="lead-view-grid" title="Griglia" aria-label="Griglia"><i data-lucide="layout-grid"></i></button>
            </div>
        </div>
    </div>

    <div id="leads-alert" class="alert" style="display:none;"></div>

    <div class="toolbar">
        <div class="search-box">
            <input type="search" id="lead-search" class="form-input" placeholder="Cerca per nome, telefono, email…" autocomplete="off">
        </div>
        <select id="lead-status-filter" class="form-select">
            <option value="">Attivi (esclusi convertiti)</option>
            <option value="new">Nuovo</option>
            <option value="contacted">Contattato</option>
            <option value="interested">Interessato</option>
            <option value="negotiating">In trattativa</option>
            <option value="converted">Convertito</option>
            <option value="lost">Perso</option>
        </select>
        <select id="lead-interest-filter" class="form-select">
            <option value="">Tutti gli interessi</option>
            <option value="affitto">Affitto</option>
            <option value="acquisto">Acquisto</option>
            <option value="entrambi">Entrambi</option>
        </select>
    </div>

    <div id="leads-bulk-toolbar" class="bulk-toolbar" hidden>
        <label><input type="checkbox" id="leads-select-all"> Seleziona tutti</label>
        <span id="leads-bulk-count" class="text-muted">0 selezionati</span>
        <button type="button" class="btn btn--sm btn--ghost" id="bulk-archive-leads">Archivia</button>
        <select id="bulk-assign-agent" class="form-select" style="max-width:180px">
            <option value="">— Agente —</option>
        </select>
        <button type="button" class="btn btn--sm btn--ghost" id="bulk-assign-leads">Riassegna</button>
    </div>

    <div id="leads-kanban" class="kanban"></div>
    <div id="leads-statsbar" class="leads-statsbar" hidden></div>

    <div id="leads-grid" class="entity-grid entity-grid--wide" hidden>
        <div class="entity-loading">Caricamento…</div>
    </div>
    <div id="leads-pagination" class="pagination-container"></div>
</div>

<!-- Matches modal -->
<div class="modal-overlay" id="lead-match-modal" hidden>
    <div class="modal modal--lg" role="dialog">
        <div class="modal-header">
            <h3 id="lead-match-title">Immobili compatibili</h3>
            <button class="modal-close" id="lead-match-close" aria-label="Chiudi">&times;</button>
        </div>
        <div class="modal-body">
            <div id="lead-match-list" class="match-list"></div>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn--ghost" id="lead-match-ok">Chiudi</button>
        </div>
    </div>
</div>

<!-- Convert to Tenant modal -->
<div class="modal-overlay" id="lead-tenant-modal" hidden>
    <div class="modal modal--sm" role="dialog" aria-label="Converti in inquilino">
        <div class="modal-header">
            <h3>Converti in Inquilino</h3>
            <button class="modal-close" id="lead-tenant-modal-close" aria-label="Chiudi">&times;</button>
        </div>
        <div class="modal-body">
            <input type="hidden" id="lead-tenant-lead-id">
            <p class="text-muted" style="margin-bottom:16px">I dati anagrafici del lead verranno copiati automaticamente nel profilo inquilino.</p>
            <div class="form-group">
                <label for="lead-tenant-email">Email <span class="required">*</span></label>
                <input type="email" id="lead-tenant-email" class="form-input" required maxlength="255">
            </div>
            <div class="form-group">
                <label for="lead-tenant-property">Immobile <span class="required">*</span></label>
                <select id="lead-tenant-property" class="form-select" required>
                    <option value="">— Seleziona immobile —</option>
                </select>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="lead-tenant-start">Inizio locazione <span class="required">*</span></label>
                    <input type="date" id="lead-tenant-start" class="form-input" required>
                </div>
                <div class="form-group">
                    <label for="lead-tenant-end">Fine locazione</label>
                    <input type="date" id="lead-tenant-end" class="form-input">
                </div>
            </div>
            <div class="form-group">
                <label for="lead-tenant-rent">Canone mensile (€)</label>
                <input type="number" id="lead-tenant-rent" class="form-input" min="0" step="0.01">
            </div>
            <div id="lead-tenant-error" class="alert alert--error" style="display:none;margin:0 0 12px 0"></div>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn--ghost" id="lead-tenant-modal-cancel">Annulla</button>
            <button type="button" class="btn btn--primary" id="lead-tenant-modal-save">Converti in Inquilino</button>
        </div>
    </div>
</div>

<script type="module" src="assets/js/leads/index.js"></script>
