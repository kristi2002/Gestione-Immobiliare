<div class="invoices-view">
    <div class="view-header">
        <div class="view-header__text">
            <h2>Fatture</h2>
            <p>Emetti e gestisci le fatture dell'agenzia.</p>
        </div>
        <button class="btn btn--primary" id="btn-new-invoice">+ Nuova Fattura</button>
    </div>

    <div id="invoices-alert" class="alert" style="display:none;"></div>

    <div class="toolbar">
        <select id="invoice-status-filter" class="form-select">
            <option value="">Tutti gli stati</option>
            <option value="draft">Bozza</option>
            <option value="sent">Inviata</option>
            <option value="paid">Pagata</option>
            <option value="cancelled">Annullata</option>
        </select>
        <input type="number" id="invoice-year-filter" class="form-input" placeholder="Anno" min="2000" max="2100" style="max-width:120px">
    </div>

    <div id="invoices-grid" class="entity-grid">
        <div class="entity-loading">Caricamento…</div>
    </div>
    <div id="invoices-pagination" class="pagination-container"></div>
</div>

<!-- Scheda Fattura quick-view -->
<div class="modal-overlay" id="invoice-scheda-modal" hidden>
    <div class="modal" role="dialog">
        <div class="modal-header">
            <div>
                <h3 id="scheda-inv-number"></h3>
                <div id="scheda-inv-badge" class="scheda-modal-badges"></div>
            </div>
            <button class="modal-close" id="invoice-scheda-close" aria-label="Chiudi">&times;</button>
        </div>
        <div class="modal-body" id="scheda-inv-body"></div>
        <div class="modal-footer">
            <button type="button" class="btn btn--ghost btn--sm" id="scheda-inv-pdf"><i data-lucide="file-text"></i> PDF</button>
            <button type="button" class="btn btn--ghost btn--sm" id="scheda-inv-send" hidden><i data-lucide="send"></i> Invia</button>
            <button type="button" class="btn btn--primary btn--sm" id="scheda-inv-paid" hidden><i data-lucide="check"></i> Pagata</button>
            <button type="button" class="btn btn--ghost btn--sm" id="scheda-inv-edit"><i data-lucide="pencil"></i> Modifica</button>
            <button type="button" class="btn btn--ghost" id="scheda-inv-close2">Chiudi</button>
        </div>
    </div>
</div>

<script src="assets/js/invoices.js"></script>
