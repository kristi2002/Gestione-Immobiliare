<div class="invoices-view">
    <div class="view-header">
        <div class="view-header__text">
            <h2>Fatture</h2>
            <p>Emetti e gestisci le fatture dell'agenzia.</p>
        </div>
        <button class="btn btn--primary" id="btn-new-invoice">+ Nuova Fattura</button>
    </div>

    <div id="invoices-alert" class="alert" style="display:none;"></div>

    <div class="toolbar">
        <select id="invoice-status-filter" class="form-select">
            <option value="">Tutti gli stati</option>
            <option value="draft">Bozza</option>
            <option value="sent">Inviata</option>
            <option value="paid">Pagata</option>
            <option value="cancelled">Annullata</option>
        </select>
        <input type="number" id="invoice-year-filter" class="form-input" placeholder="Anno" min="2000" max="2100" style="max-width:120px">
    </div>

    <div id="invoices-grid" class="entity-grid">
        <div class="entity-loading">Caricamento…</div>
    </div>
    <div id="invoices-pagination" class="pagination-container"></div>
</div>

<div class="modal-overlay" id="invoice-modal" hidden>
    <div class="modal modal--lg" role="dialog" aria-labelledby="invoice-modal-title">
        <div class="modal-header">
            <h3 id="invoice-modal-title">Nuova Fattura</h3>
            <button class="modal-close" id="invoice-modal-close" aria-label="Chiudi">&times;</button>
        </div>
        <form id="invoice-form" class="modal-body">
            <input type="hidden" id="invoice-id">
            <fieldset class="form-section">
                <legend>Intestatario</legend>
                <div class="form-row">
                    <div class="form-group">
                        <label for="invoice-client">Proprietario</label>
                        <select id="invoice-client" class="form-select"><option value="">— Nessuno —</option></select>
                    </div>
                    <div class="form-group">
                        <label for="invoice-lead">Lead</label>
                        <select id="invoice-lead" class="form-select"><option value="">— Nessuno —</option></select>
                    </div>
                </div>
            </fieldset>
            <fieldset class="form-section">
                <legend>Dettagli</legend>
                <div class="form-group">
                    <label for="invoice-description">Descrizione <span class="required">*</span></label>
                    <textarea id="invoice-description" class="form-textarea" rows="3" required></textarea>
                </div>
                <div class="form-row form-row--3">
                    <div class="form-group">
                        <label for="invoice-amount">Imponibile (€) <span class="required">*</span></label>
                        <input type="number" id="invoice-amount" class="form-input" min="0" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label for="invoice-vat">Aliquota IVA (%)</label>
                        <input type="number" id="invoice-vat" class="form-input" min="0" step="0.01" value="22">
                    </div>
                    <div class="form-group">
                        <label for="invoice-status">Stato</label>
                        <select id="invoice-status" class="form-select">
                            <option value="draft">Bozza</option>
                            <option value="sent">Inviata</option>
                            <option value="paid">Pagata</option>
                            <option value="cancelled">Annullata</option>
                        </select>
                    </div>
                </div>
                <div class="form-row form-row--3">
                    <div class="form-group">
                        <label for="invoice-issue">Data emissione</label>
                        <input type="date" id="invoice-issue" class="form-input">
                    </div>
                    <div class="form-group">
                        <label for="invoice-due">Scadenza</label>
                        <input type="date" id="invoice-due" class="form-input">
                    </div>
                    <div class="form-group">
                        <label for="invoice-paid">Data pagamento</label>
                        <input type="date" id="invoice-paid" class="form-input">
                    </div>
                </div>
                <div class="form-group">
                    <label for="invoice-notes">Note</label>
                    <textarea id="invoice-notes" class="form-textarea" rows="2"></textarea>
                </div>
            </fieldset>
            <div class="modal-footer">
                <button type="button" class="btn btn--ghost" id="invoice-modal-cancel">Annulla</button>
                <button type="submit" class="btn btn--primary" id="invoice-modal-save">Salva</button>
            </div>
        </form>
    </div>
</div>

<!-- Scheda Fattura quick-view -->
<div class="modal-overlay" id="invoice-scheda-modal" hidden>
    <div class="modal" role="dialog">
        <div class="modal-header">
            <div>
                <h3 id="scheda-inv-number"></h3>
                <div id="scheda-inv-badge" class="scheda-modal-badges"></div>
            </div>
            <button class="modal-close" id="invoice-scheda-close" aria-label="Chiudi">&times;</button>
        </div>
        <div class="modal-body" id="scheda-inv-body"></div>
        <div class="modal-footer">
            <button type="button" class="btn btn--ghost btn--sm" id="scheda-inv-pdf">📄 PDF</button>
            <button type="button" class="btn btn--ghost btn--sm" id="scheda-inv-send" hidden>📤 Invia</button>
            <button type="button" class="btn btn--primary btn--sm" id="scheda-inv-paid" hidden>✓ Pagata</button>
            <button type="button" class="btn btn--ghost btn--sm" id="scheda-inv-edit">✏️ Modifica</button>
            <button type="button" class="btn btn--ghost" id="scheda-inv-close2">Chiudi</button>
        </div>
    </div>
</div>

<script src="assets/js/invoices.js"></script>
