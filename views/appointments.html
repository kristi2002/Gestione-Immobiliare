<div class="appointments-view">
    <div class="view-header">
        <div class="view-header__text">
            <h2>Visite</h2>
            <p>Pianifica e gestisci gli appuntamenti per i sopralluoghi.</p>
        </div>
        <button class="btn btn--primary" id="btn-new-appointment">+ Nuova Visita</button>
    </div>

    <div id="appointments-alert" class="alert" style="display:none;"></div>

    <div class="db-stats">
        <div class="db-stat">
            <div class="db-stat__chip"><i data-lucide="calendar"></i></div>
            <div class="db-stat__label">Visite Oggi</div>
            <div class="db-stat__value" id="astat-today">—</div>
        </div>
        <div class="db-stat">
            <div class="db-stat__chip"><i data-lucide="calendar-days"></i></div>
            <div class="db-stat__label">Questa Settimana</div>
            <div class="db-stat__value" id="astat-week">—</div>
        </div>
        <div class="db-stat">
            <div class="db-stat__chip"><i data-lucide="clock"></i></div>
            <div class="db-stat__label">Programmate</div>
            <div class="db-stat__value" id="astat-scheduled">—</div>
        </div>
        <div class="db-stat">
            <div class="db-stat__chip"><i data-lucide="check-circle-2"></i></div>
            <div class="db-stat__label">Completate (mese)</div>
            <div class="db-stat__value" id="astat-done">—</div>
        </div>
    </div>
    <script>
    (function () {
        fetch('api/appointments.php?action=stats').then(function (r) { return r.json(); }).then(function (j) {
            if (!j.success) return;
            var set = function (id, v) { var el = document.getElementById(id); if (el) el.textContent = v; };
            set('astat-today', j.data.today); set('astat-week', j.data.week);
            set('astat-scheduled', j.data.scheduled); set('astat-done', j.data.done_month);
        }).catch(function () {});
    })();
    </script>

    <div class="toolbar">
        <select id="appt-status-filter" class="form-select">
            <option value="">Tutti gli stati</option>
            <option value="scheduled">Programmata</option>
            <option value="completed">Completata</option>
            <option value="cancelled">Annullata</option>
            <option value="no_show">Mancata presentazione</option>
        </select>
        <input type="date" id="appt-from" class="form-input" title="Da">
        <input type="date" id="appt-to" class="form-input" title="A">
    </div>

    <div id="appointments-grid" class="entity-grid">
        <div class="entity-loading">Caricamento…</div>
    </div>
    <div id="appointments-pagination" class="pagination-container"></div>
</div>

<!-- Scheda Visita quick-view -->
<div class="modal-overlay" id="appointment-scheda-modal" hidden>
    <div class="modal" role="dialog">
        <div class="modal-header">
            <div>
                <h3 id="scheda-appt-property" style="font-size: 1rem; font-weight: 700;"></h3>
                <div id="scheda-appt-badge" class="scheda-modal-badges"></div>
            </div>
            <button class="modal-close" id="appointment-scheda-close" aria-label="Chiudi">&times;</button>
        </div>
        <div class="modal-body" id="scheda-appt-body"></div>
        <div class="modal-footer">
            <button type="button" class="btn btn--primary btn--sm" id="scheda-appt-complete" hidden><i data-lucide="check"></i> Completa</button>
            <button type="button" class="btn btn--ghost btn--sm" id="scheda-appt-cancel" hidden><i data-lucide="x"></i> Annulla visita</button>
            <button type="button" class="btn btn--ghost btn--sm" id="scheda-appt-edit"><i data-lucide="pencil"></i> Modifica</button>
            <button type="button" class="btn btn--ghost" id="scheda-appt-close2">Chiudi</button>
        </div>
    </div>
</div>

<script src="assets/js/appointments.js"></script>
