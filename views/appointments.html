<div class="appointments-view">
    <div class="view-header">
        <div class="view-header__text">
            <h2>Visite</h2>
            <p>Pianifica e gestisci gli appuntamenti per i sopralluoghi.</p>
        </div>
        <button class="btn btn--primary" id="btn-new-appointment">+ Nuova Visita</button>
    </div>

    <div id="appointments-alert" class="alert" style="display:none;"></div>

    <div class="toolbar">
        <select id="appt-status-filter" class="form-select">
            <option value="">Tutti gli stati</option>
            <option value="scheduled">Programmata</option>
            <option value="completed">Completata</option>
            <option value="cancelled">Annullata</option>
            <option value="no_show">Mancata presentazione</option>
        </select>
        <input type="date" id="appt-from" class="form-input" title="Da">
        <input type="date" id="appt-to" class="form-input" title="A">
    </div>

    <div id="appointments-grid" class="entity-grid">
        <div class="entity-loading">Caricamento…</div>
    </div>
    <div id="appointments-pagination" class="pagination-container"></div>
</div>

<div class="modal-overlay" id="appointment-modal" hidden>
    <div class="modal modal--lg" role="dialog" aria-labelledby="appointment-modal-title">
        <div class="modal-header">
            <h3 id="appointment-modal-title">Nuova Visita</h3>
            <button class="modal-close" id="appointment-modal-close" aria-label="Chiudi">&times;</button>
        </div>
        <form id="appointment-form" class="modal-body">
            <input type="hidden" id="appointment-id">
            <fieldset class="form-section">
                <legend>Dettagli</legend>
                <div class="form-group">
                    <label for="appt-property">Immobile <span class="required">*</span></label>
                    <select id="appt-property" class="form-select" required>
                        <option value="">— Seleziona immobile —</option>
                    </select>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="appt-lead">Lead</label>
                        <select id="appt-lead" class="form-select"><option value="">— Nessuno —</option></select>
                    </div>
                    <div class="form-group">
                        <label for="appt-client">Proprietario</label>
                        <select id="appt-client" class="form-select"><option value="">— Nessuno —</option></select>
                    </div>
                </div>
                <div class="form-row form-row--3">
                    <div class="form-group">
                        <label for="appt-date">Data e ora <span class="required">*</span></label>
                        <input type="datetime-local" id="appt-date" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label for="appt-duration">Durata (min)</label>
                        <input type="number" id="appt-duration" class="form-input" min="1" step="5" value="60">
                    </div>
                    <div class="form-group">
                        <label for="appt-status">Stato</label>
                        <select id="appt-status" class="form-select">
                            <option value="scheduled">Programmata</option>
                            <option value="completed">Completata</option>
                            <option value="cancelled">Annullata</option>
                            <option value="no_show">Mancata presentazione</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="appt-agent">Agente</label>
                    <select id="appt-agent" class="form-select"><option value="">— Nessuno —</option></select>
                </div>
                <div class="form-group">
                    <label for="appt-notes">Note</label>
                    <textarea id="appt-notes" class="form-textarea" rows="3"></textarea>
                </div>
            </fieldset>
            <div class="modal-footer">
                <button type="button" class="btn btn--ghost" id="appointment-modal-cancel">Annulla</button>
                <button type="submit" class="btn btn--primary" id="appointment-modal-save">Salva</button>
            </div>
        </form>
    </div>
</div>

<script src="assets/js/appointments.js"></script>
