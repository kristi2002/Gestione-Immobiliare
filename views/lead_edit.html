<div class="lead-edit-view entity-edit-view">
    <div class="profile-topbar">
        <button class="btn btn--ghost" id="lde-back"><i data-lucide="arrow-left"></i> Indietro</button>
    </div>

    <div class="view-header">
        <div class="view-header__text">
            <h2 id="lde-title">Nuovo Lead</h2>
            <p>Dati del potenziale cliente, preferenze immobiliari e gestione.</p>
        </div>
    </div>

    <div id="lde-alert" class="alert" style="display:none;"></div>

    <div class="card" style="padding:8px 28px 24px;">
        <form id="lde-form">
            <input type="hidden" id="lde-id">

            <fieldset class="form-section">
                <legend>Anagrafica</legend>
                <div class="form-row">
                    <div class="form-group"><label for="lde-name">Nome <span class="required">*</span></label><input type="text" id="lde-name" class="form-input" required maxlength="100" autocomplete="off"></div>
                    <div class="form-group"><label for="lde-surname">Cognome <span class="required">*</span></label><input type="text" id="lde-surname" class="form-input" required maxlength="100" autocomplete="off"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label for="lde-phone">Telefono</label><input type="tel" id="lde-phone" class="form-input" maxlength="30" inputmode="tel" autocomplete="off" placeholder="es. 333 1234567"></div>
                    <div class="form-group"><label for="lde-email">Email</label><input type="email" id="lde-email" class="form-input" maxlength="255" autocomplete="off" placeholder="nome@esempio.it"></div>
                </div>
                <details class="form-advanced" id="lde-more">
                    <summary>Dati aggiuntivi — Codice Fiscale (serve per convertire in proprietario/contratto)</summary>
                    <div class="form-row">
                        <div class="form-group" style="max-width:320px"><label for="lde-cf">Codice Fiscale</label><input type="text" id="lde-cf" class="form-input" maxlength="16" placeholder="es. RSSMRA80A01H501U" style="text-transform:uppercase"></div>
                    </div>
                </details>
            </fieldset>

            <fieldset class="form-section">
                <legend>Preferenze immobile</legend>
                <div class="form-group">
                    <label for="lde-property-search">Immobile richiesto <span class="form-hint-inline">— l'immobile specifico per cui chiama (cerca per RIF o indirizzo)</span></label>
                    <input type="text" id="lde-property-search" class="form-input" list="lde-property-list" autocomplete="off" placeholder="Cerca per riferimento (es. RIF-001) o indirizzo…">
                    <datalist id="lde-property-list"></datalist>
                    <input type="hidden" id="lde-property-id">
                </div>
                <div class="form-row form-row--3">
                    <div class="form-group">
                        <label for="lde-interest">Interesse</label>
                        <select id="lde-interest" class="form-select">
                            <option value="affitto">Affitto</option>
                            <option value="acquisto">Acquisto</option>
                            <option value="entrambi">Entrambi</option>
                        </select>
                    </div>
                    <div class="form-group"><label for="lde-budget-min">Budget min (€)</label><input type="number" id="lde-budget-min" class="form-input" min="0" step="0.01"></div>
                    <div class="form-group"><label for="lde-budget-max">Budget max (€)</label><input type="number" id="lde-budget-max" class="form-input" min="0" step="0.01"></div>
                </div>
                <div class="form-row form-row--3">
                    <div class="form-group"><label for="lde-city">Città preferita</label><input type="text" id="lde-city" class="form-input" maxlength="100"></div>
                    <div class="form-group">
                        <label for="lde-type">Tipo immobile</label>
                        <select id="lde-type" class="form-select">
                            <option value="">— Indifferente —</option>
                            <option value="appartamento">Appartamento</option>
                            <option value="villa">Villa</option>
                            <option value="ufficio">Ufficio</option>
                            <option value="negozio">Negozio</option>
                            <option value="box">Box</option>
                            <option value="terreno">Terreno</option>
                            <option value="altro">Altro</option>
                        </select>
                    </div>
                    <div class="form-group"><label for="lde-min-rooms">Camere da letto (min)</label><input type="number" id="lde-min-rooms" class="form-input" min="0" step="1"></div>
                </div>
                <div class="form-group" style="max-width:320px"><label for="lde-min-sqm">Metri quadri minimi</label><input type="number" id="lde-min-sqm" class="form-input" min="0" step="0.01"></div>
            </fieldset>

            <fieldset class="form-section">
                <legend>Gestione</legend>
                <div class="form-row form-row--3">
                    <div class="form-group">
                        <label for="lde-status">Stato</label>
                        <select id="lde-status" class="form-select">
                            <option value="new">Nuovo</option>
                            <option value="contacted">Contattato</option>
                            <option value="interested">Interessato</option>
                            <option value="negotiating">In trattativa</option>
                            <option value="converted">Convertito</option>
                            <option value="lost">Perso</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="lde-source">Fonte</label>
                        <select id="lde-source" class="form-select">
                            <option value="telefono">Telefono</option>
                            <option value="email">Email</option>
                            <option value="web">Web</option>
                            <option value="passaparola">Passaparola</option>
                            <option value="social">Social</option>
                            <option value="immobiliare">Immobiliare.it</option>
                            <option value="idealista">Idealista</option>
                            <option value="casa">Casa.it</option>
                            <option value="subito">Subito</option>
                            <option value="altro">Altro</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="lde-assigned">Agente assegnato</label>
                        <select id="lde-assigned" class="form-select"><option value="">— Nessuno —</option></select>
                    </div>
                </div>
                <div class="form-group"><label for="lde-notes">Note</label><textarea id="lde-notes" class="form-textarea" rows="3"></textarea></div>
            </fieldset>

            <div id="lde-error" class="alert alert--error" style="display:none;margin:12px 0 0 0"></div>

            <div class="form-actions lde-actions">
                <span class="lde-kbd-hint"><kbd>Invio</kbd> per salvare · <kbd>Esc</kbd> per annullare</span>
                <div class="lde-actions__btns">
                    <button type="button" class="btn btn--ghost" id="lde-cancel">Annulla</button>
                    <button type="submit" class="btn btn--primary" id="lde-save">Salva</button>
                </div>
            </div>
        </form>
    </div>
</div>

<style>
.lead-edit-view .form-advanced { margin-top: 2px; }
.lead-edit-view .form-advanced > summary {
    cursor: pointer; list-style: none; user-select: none;
    color: var(--color-text-muted, #6b7688); font-size: 13px; padding: 6px 0;
}
.lead-edit-view .form-advanced > summary::-webkit-details-marker { display: none; }
.lead-edit-view .form-advanced > summary::before { content: "\25B8\00a0"; }
.lead-edit-view .form-advanced[open] > summary::before { content: "\25BE\00a0"; }
.lead-edit-view .form-advanced[open] > summary { margin-bottom: 6px; }
.lead-edit-view .form-hint-inline { font-weight: 400; font-size: 12px; color: var(--color-text-muted, #94a3b8); }
.lead-edit-view .lde-actions {
    position: sticky; bottom: 0; z-index: 5;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    margin: 20px -28px -24px; padding: 14px 28px;
    background: var(--color-surface, #fff);
    border-top: 1px solid var(--color-border, #e6ebf1);
}
.lead-edit-view .lde-actions__btns { display: flex; gap: 8px; }
.lead-edit-view .lde-kbd-hint { font-size: 12px; color: var(--color-text-muted, #6b7688); }
.lead-edit-view .lde-kbd-hint kbd {
    font-family: inherit; font-size: 11px; line-height: 1;
    background: var(--color-surface-muted, #f1f5f9);
    border: 1px solid var(--color-border-strong, #cbd5e1); border-bottom-width: 2px;
    border-radius: 4px; padding: 2px 5px; color: var(--color-text, #334155);
}
@media (max-width: 640px) { .lead-edit-view .lde-kbd-hint { display: none; } }
</style>

<script src="assets/js/lead_edit.js?v=2"></script>
