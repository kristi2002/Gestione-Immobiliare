<div class="expense-edit-view entity-edit-view">
    <div class="profile-topbar">
        <button class="btn btn--ghost" id="exe-back"><i data-lucide="arrow-left"></i> Indietro</button>
    </div>

    <div class="view-header">
        <div class="view-header__text">
            <h2 id="exe-title">Nuova Spesa</h2>
            <p>Registra una spesa e collegala a immobile, proprietario o fornitore.</p>
        </div>
    </div>

    <div id="exe-alert" class="alert" style="display:none;"></div>

    <div class="card" style="padding:24px 28px;">
        <form id="exe-form">
            <input type="hidden" id="exe-id">

            <div class="form-row">
                <div class="form-group">
                    <label for="exe-category">Categoria</label>
                    <select id="exe-category" class="form-select">
                        <option value="manutenzione">Manutenzione</option>
                        <option value="utenze">Utenze</option>
                        <option value="tasse">Tasse</option>
                        <option value="assicurazione">Assicurazione</option>
                        <option value="agenzia">Agenzia</option>
                        <option value="altro">Altro</option>
                    </select>
                </div>
                <div class="form-group"><label for="exe-amount">Importo (€) <span class="required">*</span></label><input type="number" id="exe-amount" class="form-input" min="0" step="0.01" required></div>
            </div>

            <div class="form-group">
                <label for="exe-description">Descrizione <span class="required">*</span></label>
                <input type="text" id="exe-description" class="form-input" required maxlength="500">
            </div>

            <div class="form-row form-row--3">
                <div class="form-group"><label for="exe-date">Data <span class="required">*</span></label><input type="date" id="exe-date" class="form-input" required></div>
                <div class="form-group"><label for="exe-property">Immobile</label><select id="exe-property" class="form-select"><option value="">— Nessuno —</option></select></div>
                <div class="form-group"><label for="exe-client">Proprietario</label><select id="exe-client" class="form-select"><option value="">— Nessuno —</option></select></div>
            </div>

            <div class="form-row">
                <div class="form-group"><label for="exe-supplier">Fornitore</label><select id="exe-supplier" class="form-select"><option value="">— Nessuno —</option></select></div>
                <div class="form-group"><label for="exe-receipt">URL ricevuta</label><input type="text" id="exe-receipt" class="form-input" maxlength="500" placeholder="https://…"></div>
            </div>

            <div class="form-group"><label for="exe-notes">Note</label><textarea id="exe-notes" class="form-textarea" rows="2"></textarea></div>

            <div id="exe-error" class="alert alert--error" style="display:none;margin:12px 0 0 0"></div>

            <div class="form-actions" style="display:flex;gap:8px;justify-content:flex-end;margin-top:20px;">
                <button type="button" class="btn btn--ghost" id="exe-cancel">Annulla</button>
                <button type="submit" class="btn btn--primary" id="exe-save">Salva</button>
            </div>
        </form>
    </div>
</div>

<script src="assets/js/expense_edit.js?v=1"></script>
