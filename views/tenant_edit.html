<div class="tenant-edit-view entity-edit-view">
    <div class="profile-topbar">
        <button class="btn btn--ghost" id="tne-back"><i data-lucide="arrow-left"></i> Indietro</button>
    </div>

    <div class="view-header">
        <div class="view-header__text">
            <h2 id="tne-title">Nuovo inquilino</h2>
            <p>Dati del conduttore, immobile, durata della locazione e accesso al portale.</p>
        </div>
    </div>

    <div id="tne-alert" class="alert" style="display:none;"></div>

    <div class="card" style="padding:24px 28px;">
        <form id="tne-form">
            <input type="hidden" id="tne-id">

            <div class="form-row form-row--2">
                <div class="form-group"><label for="tne-name">Nome <span class="required">*</span></label><input type="text" id="tne-name" class="form-input" required></div>
                <div class="form-group"><label for="tne-surname">Cognome <span class="required">*</span></label><input type="text" id="tne-surname" class="form-input" required></div>
            </div>
            <div class="form-row form-row--2">
                <div class="form-group"><label for="tne-email">Email <span class="required">*</span></label><input type="email" id="tne-email" class="form-input" required></div>
                <div class="form-group"><label for="tne-phone">Telefono</label><input type="text" id="tne-phone" class="form-input"></div>
            </div>
            <div class="form-group">
                <label for="tne-property">Immobile <span class="required">*</span></label>
                <select id="tne-property" class="form-select" required><option value="">— Seleziona —</option></select>
            </div>
            <div class="form-row form-row--3">
                <div class="form-group"><label for="tne-lease-start">Inizio contratto</label><input type="date" id="tne-lease-start" class="form-input"></div>
                <div class="form-group"><label for="tne-lease-end">Fine contratto</label><input type="date" id="tne-lease-end" class="form-input"></div>
                <div class="form-group"><label for="tne-rent">Canone mensile (€)</label><input type="number" step="0.01" id="tne-rent" class="form-input"></div>
            </div>
            <div class="form-group" style="max-width:420px"><label for="tne-portal-pass">Password portale inquilino</label><input type="password" id="tne-portal-pass" class="form-input" minlength="8" placeholder="Min. 8 caratteri (opzionale in modifica)"></div>
            <div class="form-group"><label for="tne-notes">Note</label><textarea id="tne-notes" class="form-textarea" rows="2"></textarea></div>

            <div id="tne-error" class="alert alert--error" style="display:none;margin:12px 0 0 0"></div>

            <div class="form-actions" style="display:flex;gap:8px;justify-content:flex-end;margin-top:20px;">
                <button type="button" class="btn btn--ghost" id="tne-pdf"><i data-lucide="file-text"></i> Genera contratto PDF</button>
                <button type="button" class="btn btn--ghost" id="tne-cancel">Annulla</button>
                <button type="submit" class="btn btn--primary" id="tne-save">Salva</button>
            </div>
        </form>
    </div>
</div>

<script src="assets/js/tenant_edit.js?v=1"></script>
