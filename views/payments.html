<div class="payments-view">
    <div class="view-header">
        <div class="view-header__text">
            <h2>Pagamenti</h2>
            <p>Scadenzario affitti: gestisci canoni, scadenze e incassi.</p>
        </div>
        <button class="btn btn--primary" id="btn-new-payment">
            + Nuovo Pagamento
        </button>
    </div>

    <div id="payments-alert" class="alert" style="display:none;"></div>

    <div class="toolbar">
        <select id="payment-status-filter" class="form-select">
            <option value="">Tutti gli stati</option>
            <option value="pending">In attesa</option>
            <option value="paid">Pagati</option>
            <option value="late">In ritardo</option>
            <option value="cancelled">Annullati</option>
        </select>
        <select id="payment-month-filter" class="form-select">
            <option value="">Tutti i mesi</option>
            <option value="1">Gennaio</option>
            <option value="2">Febbraio</option>
            <option value="3">Marzo</option>
            <option value="4">Aprile</option>
            <option value="5">Maggio</option>
            <option value="6">Giugno</option>
            <option value="7">Luglio</option>
            <option value="8">Agosto</option>
            <option value="9">Settembre</option>
            <option value="10">Ottobre</option>
            <option value="11">Novembre</option>
            <option value="12">Dicembre</option>
        </select>
        <input type="number" id="payment-year-filter" class="form-input" placeholder="Anno" min="2000" max="2100" style="max-width:120px">
    </div>

    <div id="payments-grid" class="entity-grid">
        <div class="entity-loading">Caricamento…</div>
    </div>
    <div id="payments-pagination" class="pagination-container"></div>
</div>

<!-- Create / Edit modal -->
<div class="modal-overlay" id="payment-modal" hidden>
    <div class="modal modal--lg" role="dialog" aria-labelledby="payment-modal-title">
        <div class="modal-header">
            <h3 id="payment-modal-title">Nuovo Pagamento</h3>
            <button class="modal-close" id="payment-modal-close" aria-label="Chiudi">&times;</button>
        </div>
        <form id="payment-form" class="modal-body">
            <input type="hidden" id="payment-id">
            <input type="hidden" id="payment-contract-id">

            <div class="form-row">
                <div class="form-group">
                    <label for="payment-tenant">Inquilino <span class="required">*</span></label>
                    <select id="payment-tenant" class="form-select" required>
                        <option value="">— Seleziona inquilino —</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="payment-property">Immobile <span class="required">*</span></label>
                    <select id="payment-property" class="form-select" required>
                        <option value="">— Seleziona immobile —</option>
                    </select>
                </div>
            </div>

            <div class="form-row form-row--3">
                <div class="form-group">
                    <label for="payment-amount">Importo (€) <span class="required">*</span></label>
                    <input type="number" id="payment-amount" class="form-input" min="0" step="0.01" required>
                </div>
                <div class="form-group">
                    <label for="payment-due-date">Scadenza <span class="required">*</span></label>
                    <input type="date" id="payment-due-date" class="form-input" required>
                </div>
                <div class="form-group">
                    <label for="payment-status">Stato</label>
                    <select id="payment-status" class="form-select">
                        <option value="pending">In attesa</option>
                        <option value="paid">Pagato</option>
                        <option value="late">In ritardo</option>
                        <option value="cancelled">Annullato</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="payment-paid-date">Data pagamento</label>
                <input type="date" id="payment-paid-date" class="form-input">
            </div>

            <div class="form-group">
                <label for="payment-notes">Note</label>
                <textarea id="payment-notes" class="form-textarea" rows="2"></textarea>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn--ghost" id="payment-modal-cancel">Annulla</button>
                <button type="submit" class="btn btn--primary" id="payment-modal-save">Salva</button>
            </div>
        </form>
    </div>
</div>

<!-- Scheda Pagamento quick-view -->
<div class="modal-overlay" id="payment-scheda-modal" hidden>
    <div class="modal" role="dialog">
        <div class="modal-header">
            <div>
                <div id="scheda-pay-amount" class="scheda-amount-hero"></div>
                <div id="scheda-pay-badge" class="scheda-modal-badges"></div>
            </div>
            <button class="modal-close" id="payment-scheda-close" aria-label="Chiudi">&times;</button>
        </div>
        <div class="modal-body" id="scheda-pay-body"></div>
        <div class="modal-footer">
            <button type="button" class="btn btn--primary btn--sm" id="scheda-pay-paid" hidden>✓ Segna pagato</button>
            <button type="button" class="btn btn--ghost btn--sm" id="scheda-pay-edit">✏️ Modifica</button>
            <button type="button" class="btn btn--ghost" id="scheda-pay-close2">Chiudi</button>
        </div>
    </
