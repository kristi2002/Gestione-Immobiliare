<div class="payments-view">
    <div class="view-header">
        <div class="view-header__text">
            <h2>Pagamenti</h2>
            <p>Scadenzario affitti: gestisci canoni, scadenze e incassi.</p>
        </div>
        <div class="view-header__actions" style="display:flex;gap:8px;flex-wrap:wrap;">
            <button class="btn btn--ghost" id="btn-export-sdd" title="Esporta file SEPA SDD del mese"><i data-lucide="banknote-arrow-down"></i> Esporta SDD</button>
            <button class="btn btn--primary" id="btn-new-payment">+ Nuovo Pagamento</button>
        </div>
    </div>

    <!-- SDD export modal -->
    <div class="modal-overlay" id="sdd-modal" hidden>
        <div class="modal modal--sm" role="dialog" aria-labelledby="sdd-modal-title">
            <div class="modal-header">
                <h3 id="sdd-modal-title">Esporta addebiti SEPA (SDD)</h3>
                <button class="modal-close" id="sdd-modal-close" aria-label="Chiudi">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="sdd-month">Mese di competenza</label>
                    <input type="month" id="sdd-month" class="form-input">
                </div>
                <div id="sdd-preview" class="text-muted" style="font-size:13px;"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn--ghost" id="sdd-modal-cancel">Annulla</button>
                <button type="button" class="btn btn--primary" id="sdd-download" disabled>Scarica file</button>
            </div>
        </div>
    </div>

    <div id="payments-alert" class="alert" style="display:none;"></div>

    <div class="db-stats">
        <div class="db-stat">
            <div class="db-stat__chip"><i data-lucide="banknote"></i></div>
            <div class="db-stat__label">Incassato questo mese</div>
            <div class="db-stat__value" id="pstat-paid">—</div>
        </div>
        <div class="db-stat">
            <div class="db-stat__chip"><i data-lucide="hourglass"></i></div>
            <div class="db-stat__label">In attesa (mese)</div>
            <div class="db-stat__value" id="pstat-pending">—</div>
        </div>
        <div class="db-stat db-stat--danger">
            <div class="db-stat__chip"><i data-lucide="alert-triangle"></i></div>
            <div class="db-stat__label">In ritardo</div>
            <div class="db-stat__value" id="pstat-late">—</div>
        </div>
        <div class="db-stat">
            <div class="db-stat__chip"><i data-lucide="trending-up"></i></div>
            <div class="db-stat__label">Incassato anno</div>
            <div class="db-stat__value" id="pstat-year">—</div>
        </div>
    </div>
    <script>
    (function () {
        var eur = function (v) { return '€ ' + Number(v || 0).toLocaleString('it-IT', { maximumFractionDigits: 0 }); };
        fetch('api/payments.php?action=stats').then(function (r) { return r.json(); }).then(function (j) {
            if (!j.success) return;
            var set = function (id, v) { var el = document.getElementById(id); if (el) el.textContent = v; };
            set('pstat-paid', eur(j.data.paid_month));
            set('pstat-pending', eur(j.data.pending_month));
            set('pstat-late', eur(j.data.late_total) + (j.data.late_count ? ' (' + j.data.late_count + ')' : ''));
            set('pstat-year', eur(j.data.year_paid));
        }).catch(function () {});
    })();
    </script>

    <div class="toolbar">
        <select id="payment-status-filter" class="form-select">
            <option value="">Tutti gli stati</option>
            <option value="pending">In attesa</option>
            <option value="paid">Pagati</option>
            <option value="late">In ritardo</option>
            <option value="cancelled">Annullati</option>
        </select>
        <select id="payment-month-filter" class="form-select">
            <option value="">Tutti i mesi</option>
            <option value="1">Gennaio</option>
            <option value="2">Febbraio</option>
            <option value="3">Marzo</option>
            <option value="4">Aprile</option>
            <option value="5">Maggio</option>
            <option value="6">Giugno</option>
            <option value="7">Luglio</option>
            <option value="8">Agosto</option>
            <option value="9">Settembre</option>
            <option value="10">Ottobre</option>
            <option value="11">Novembre</option>
            <option value="12">Dicembre</option>
        </select>
        <input type="number" id="payment-year-filter" class="form-input" placeholder="Anno" min="2000" max="2100" style="max-width:120px">
    </div>

    <div id="payments-grid" class="entity-grid">
        <div class="entity-loading">Caricamento…</div>
    </div>
    <div id="payments-pagination" class="pagination-container"></div>
</div>

<!-- Scheda Pagamento quick-view -->
<div class="modal-overlay" id="payment-scheda-modal" hidden>
    <div class="modal" role="dialog">
        <div class="modal-header">
            <div>
                <div id="scheda-pay-amount" class="scheda-amount-hero"></div>
                <div id="scheda-pay-badge" class="scheda-modal-badges"></div>
            </div>
            <button class="modal-close" id="payment-scheda-close" aria-label="Chiudi">&times;</button>
        </div>
        <div class="modal-body" id="scheda-pay-body"></div>
        <div class="modal-footer">
            <button type="button" class="btn btn--primary btn--sm" id="scheda-pay-paid" hidden><i data-lucide="check"></i> Segna pagato</button>
            <button type="button" class="btn btn--ghost btn--sm" id="scheda-pay-edit"><i data-lucide="pencil"></i> Modifica</button>
            <button type="button" class="btn btn--ghost" id="scheda-pay-close2">Chiudi</button>
        </div>
    </div>
</div>

<script src="assets/js/payments.js"></script>
